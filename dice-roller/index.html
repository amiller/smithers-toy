<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>Dice Roller</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(circle at top, #2a2a4a 0%, #15152a 100%);
  color: #fff;
  overflow: hidden;
}
.container { text-align: center; padding: 2rem; }
h1 {
  font-size: clamp(1.5rem, 5vw, 2.5rem);
  margin-bottom: 0.5rem;
  background: linear-gradient(135deg, #f9d423, #ff4e50);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 2px;
}
.subtitle { color: #8a8aaa; margin-bottom: 2.5rem; font-size: 0.95rem; }
.dice-stage {
  display: flex; gap: 2rem; justify-content: center;
  margin-bottom: 2.5rem; perspective: 800px;
}
.die {
  width: 100px; height: 100px;
  background: linear-gradient(145deg, #ffffff, #e0e0e0);
  border-radius: 18px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.4), inset 0 -4px 8px rgba(0,0,0,0.1);
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  padding: 14px; gap: 4px;
  transform-style: preserve-3d;
}
.die.rolling { animation: tumble 0.8s ease-in-out; }
@keyframes tumble {
  0% { transform: rotateX(0) rotateY(0) rotateZ(0); }
  25% { transform: rotateX(180deg) rotateY(90deg) rotateZ(45deg); }
  50% { transform: rotateX(360deg) rotateY(180deg) rotateZ(180deg); }
  75% { transform: rotateX(540deg) rotateY(270deg) rotateZ(225deg); }
  100% { transform: rotateX(720deg) rotateY(360deg) rotateZ(360deg); }
}
.pip {
  background: #333; border-radius: 50%;
  box-shadow: inset 0 2px 3px rgba(0,0,0,0.5);
}
.p1 { grid-area: 1 / 1; } .p2 { grid-area: 1 / 2; } .p3 { grid-area: 1 / 3; }
.p4 { grid-area: 2 / 1; } .p5 { grid-area: 2 / 2; } .p6 { grid-area: 2 / 3; }
.p7 { grid-area: 3 / 1; } .p8 { grid-area: 3 / 2; } .p9 { grid-area: 3 / 3; }
.roll-btn {
  background: linear-gradient(135deg, #ff4e50, #f9d423);
  color: #fff; border: none;
  padding: 1rem 3rem; font-size: 1.25rem; font-weight: 700;
  border-radius: 50px; cursor: pointer;
  text-transform: uppercase; letter-spacing: 2px;
  box-shadow: 0 6px 20px rgba(255,78,80,0.4);
  transition: transform 0.15s, box-shadow 0.15s;
}
.roll-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(255,78,80,0.5); }
.roll-btn:active { transform: translateY(0); }
.roll-btn:disabled { opacity: 0.6; cursor: not-allowed; }
.total { margin-top: 2rem; font-size: 1.2rem; color: #8a8aaa; min-height: 2rem; }
.total strong { color: #f9d423; font-size: 2rem; margin-left: 0.5rem; }
.history { margin-top: 1.5rem; display: flex; gap: 0.5rem; justify-content: center; flex-wrap: wrap; min-height: 2rem; }
.history-item {
  background: rgba(255,255,255,0.08);
  padding: 0.3rem 0.7rem;
  border-radius: 12px; font-size: 0.85rem; color: #ccc;
  border: 1px solid rgba(255,255,255,0.1);
}
hint { color:#666; font-size:0.8rem; }
</style>
</head>
<body>
<div class='container'>
  <h1>DICE ROLLER</h1>
  <p class='subtitle'>Roll two dice and see your total</p>
  <div class='dice-stage'>
    <div class='die' id='die1'></div>
    <div class='die' id='die2'></div>
  </div>
  <button class='roll-btn' id='rollBtn'>Roll Dice</button>
  <div class='total' id='total'>Click to roll</div>
  <div class='history' id='history'></div>
  <p class='hint' style='color:#666;font-size:0.8rem;margin-top:1rem'>Tip: press Space to roll</p>
</div>
<script>
const faces = { 1:[5], 2:[1,9], 3:[1,5,9], 4:[1,3,7,9], 5:[1,3,5,7,9], 6:[1,3,4,6,7,9] };
function renderDie(dieEl, value) {
  dieEl.innerHTML = '';
  const active = faces[value];
  for (let i = 1; i <= 9; i++) {
    const pip = document.createElement('div');
    pip.className = 'pip p' + i;
    pip.style.visibility = active.indexOf(i) >= 0 ? 'visible' : 'hidden';
    dieEl.appendChild(pip);
  }
}
const die1 = document.getElementById('die1');
const die2 = document.getElementById('die2');
const rollBtn = document.getElementById('rollBtn');
const totalEl = document.getElementById('total');
const historyEl = document.getElementById('history');
renderDie(die1, 1);
renderDie(die2, 1);
let rolling = false;
const history = [];
function roll() {
  if (rolling) return;
  rolling = true;
  rollBtn.disabled = true;
  totalEl.textContent = 'Rolling...';
  die1.classList.remove('rolling');
  die2.classList.remove('rolling');
  void die1.offsetWidth;
  void die2.offsetWidth;
  die1.classList.add('rolling');
  die2.classList.add('rolling');
  const interval = setInterval(function() {
    renderDie(die1, Math.floor(Math.random()*6)+1);
    renderDie(die2, Math.floor(Math.random()*6)+1);
  }, 80);
  setTimeout(function() {
    clearInterval(interval);
    const v1 = Math.floor(Math.random()*6)+1;
    const v2 = Math.floor(Math.random()*6)+1;
    renderDie(die1, v1);
    renderDie(die2, v2);
    die1.classList.remove('rolling');
    die2.classList.remove('rolling');
    const sum = v1 + v2;
    totalEl.innerHTML = 'Total: <strong>' + sum + '</strong>';
    history.unshift(sum);
    if (history.length > 8) history.pop();
    historyEl.innerHTML = history.map(function(h){ return '<span class="history-item">' + h + '</span>'; }).join('');
    rolling = false;
    rollBtn.disabled = false;
  }, 800);
}
rollBtn.addEventListener('click', roll);
document.addEventListener('keydown', function(e) {
  if (e.code === 'Space') { e.preventDefault(); roll(); }
});
</script>
</body>
</html>
